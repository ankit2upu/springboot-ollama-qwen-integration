
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="ai icon" href="ai-assistant.png" >
    <link rel="stylesheet" href="style.css">
    <title>Spring AI Chat</title>

</head>

<body>

    
<header class="page-header">
    <div class="header-content">
        <h1>🤖 Spring AI Chat</h1>
        <p>Ask anything and get instant AI replies.</p>
    </div>
</header>


<div class="container">
    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="prompt" placeholder="Ask something..." aria-label="Chat prompt" />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
        <button id="clearBtn" onclick="clearChat()" class="secondary">Clear</button>
    </div>
    <div class="hint">Press Enter to send your message.</div>
   
</div>

<!-- <footer class="page-footer">
    <p>Built with Spring Boot and AI chat support • Made by ♥ Ankit Gupta</p>
   
</footer> -->

<script src="index.js"></script>
</body>
</html>
